<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndianLawAI • Legal Intelligence Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading-serif {
            font-family: 'Playfair Display', Georgia, serif;
        }

        .chat-container {
            scrollbar-width: thin;
            scrollbar-color: #8FDDDF #f1f5f9;
        }

        .message-user {
            background: linear-gradient(135deg, #8FDDDF 0%, #6BC8CB 100%);
            color: white;
            border-radius: 18px 18px 4px 18px;
        }

        .message-ai {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .section-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-white text-slate-900">
    <!-- Navbar -->
    <nav class="border-b border-slate-100 bg-white/95 backdrop-blur-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-[#8FDDDF] rounded-2xl flex items-center justify-center">
                    <i class="fas fa-balance-scale text-white text-2xl"></i>
                </div>
                <div>
                    <span class="font-semibold text-2xl tracking-tight">IndianLawAI</span>
                    <span class="text-xs text-slate-400 font-medium block -mt-1">v1.0 • Production</span>
                </div>
            </div>
            
            <div class="flex items-center gap-x-2 text-sm">
                <div class="flex items-center gap-x-2 px-4 py-1.5 bg-slate-50 rounded-3xl text-slate-600">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="font-medium">Free Tier Active</span>
                </div>
                <button onclick="showIngestModal()" 
                        class="px-5 py-2 bg-[#8FDDDF] hover:bg-[#6BC8CB] text-white font-semibold rounded-3xl flex items-center gap-x-2 transition-all active:scale-[0.985]">
                    <i class="fas fa-upload text-sm"></i>
                    <span class="font-medium">Add Data</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 pt-8 pb-12">
        <!-- Hero Section -->
        <div class="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-8 mb-10">
            <div>
                <div class="inline-flex items-center gap-x-2 px-4 py-1.5 bg-[#8FDDDF]/10 text-[#8FDDDF] rounded-3xl text-sm font-semibold mb-4">
                    <i class="fas fa-globe"></i>
                    <span>100% Free • No Limits</span>
                </div>
                <h1 class="text-6xl font-semibold tracking-tighter heading-serif">Indian Law<br>Intelligence</h1>
                <p class="mt-3 max-w-md text-xl text-slate-600">Ask any question about IPC, CrPC, or any Indian law.</p>
            </div>
            
            <div class="lg:w-80 bg-white border border-slate-100 rounded-3xl p-5">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <div class="text-xs font-medium text-slate-500">CURRENT DATASET</div>
                        <div class="font-semibold">IPC + CrPC + 40+ Acts</div>
                    </div>
                    <div class="text-right">
                        <div class="text-emerald-600 text-xs font-bold">LIVE</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Interface -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Sidebar -->
            <div class="lg:col-span-3 bg-white border border-slate-100 rounded-3xl p-6 h-fit">
                <div class="mb-6">
                    <div class="font-semibold text-sm tracking-wider text-slate-500 mb-3 px-1">QUICK ACTIONS</div>
                    <div class="space-y-1">
                        <button onclick="quickQuery('What is the punishment for murder under IPC Section 302?')" 
                                class="w-full text-left px-4 py-3 text-sm hover:bg-slate-50 rounded-2xl flex items-center gap-x-3 transition-colors">
                            <i class="fas fa-gavel w-4 text-[#8FDDDF]"></i>
                            <span>IPC 302 - Murder</span>
                        </button>
                        <button onclick="quickQuery('What are my rights if arrested in India?')" 
                                class="w-full text-left px-4 py-3 text-sm hover:bg-slate-50 rounded-2xl flex items-center gap-x-3 transition-colors">
                            <i class="fas fa-user-shield w-4 text-[#8FDDDF]"></i>
                            <span>Arrest Rights (CrPC)</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Chat Window -->
            <div class="lg:col-span-9 bg-white border border-slate-100 rounded-3xl overflow-hidden flex flex-col" style="height: 620px;">
                <!-- Chat Header -->
                <div class="px-6 py-4 border-b flex items-center justify-between bg-slate-50/70">
                    <div class="flex items-center gap-x-3">
                        <div class="w-9 h-9 bg-[#8FDDDF] rounded-2xl flex items-center justify-center">
                            <i class="fas fa-robot text-white"></i>
                        </div>
                        <div>
                            <div class="font-semibold">Legal Assistant</div>
                            <div class="text-xs text-emerald-600 flex items-center gap-x-1.5">
                                <i class="fas fa-circle text-[8px]"></i> 
                                <span>Online • Guardrails Active</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Messages -->
                <div id="chat-messages" class="flex-1 p-6 overflow-y-auto chat-container bg-[#fafafa] space-y-6">
                    <!-- Populated by JS -->
                </div>

                <!-- Input Area -->
                <div class="p-4 border-t bg-white">
                    <div class="flex gap-x-3">
                        <input id="user-input" 
                               type="text" 
                               placeholder="Ask about any Indian law or situation..." 
                               class="flex-1 px-5 py-3.5 border border-slate-200 focus:border-[#8FDDDF] focus:ring-1 focus:ring-[#8FDDDF] outline-none rounded-3xl text-sm"
                               onkeypress="if (event.key === 'Enter') sendMessage()">
                        <button onclick="sendMessage()" 
                                class="px-8 py-3.5 bg-[#8FDDDF] hover:bg-[#6BC8CB] text-white font-semibold rounded-3xl flex items-center justify-center gap-x-2 text-sm">
                            <span>Send</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const BACKEND_URL = "https://indianlawai-backend.onrender.com"; 
        // ↑ Replace the above URL with your actual Render backend URL
        // ========================================================

        function initializeChat() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = `
                <div class="flex justify-start">
                    <div class="max-w-[82%] px-5 py-4 bg-white border border-slate-200 rounded-3xl text-sm message-ai">
                        <div class="font-medium mb-1">Hello! I'm your Indian Law Intelligence Assistant.</div>
                        <div class="text-slate-600">Ask me anything about IPC, CrPC, or any Indian law.</div>
                    </div>
                </div>
            `;
        }

        function addMessage(content, isUser = false) {
            const container = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            
            const inner = document.createElement('div');
            inner.className = `max-w-[82%] px-5 py-3.5 text-sm ${isUser ? 'message-user' : 'message-ai'}`;
            inner.innerHTML = `<div>${content}</div>`;
            
            messageDiv.appendChild(inner);
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chat-messages');
            const typing = document.createElement('div');
            typing.id = 'typing-indicator';
            typing.className = `flex justify-start`;
            typing.innerHTML = `
                <div class="max-w-[82%] px-5 py-3.5 bg-white border border-slate-200 rounded-3xl text-sm flex items-center gap-x-2">
                    <div class="flex gap-x-1">
                        <div class="w-1.5 h-1.5 bg-slate-300 rounded-full animate-bounce"></div>
                        <div class="w-1.5 h-1.5 bg-slate-300 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                        <div class="w-1.5 h-1.5 bg-slate-300 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
                    </div>
                    <span class="text-xs text-slate-400">Thinking...</span>
                </div>
            `;
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const query = input.value.trim();
            if (!query) return;

            addMessage(query, true);
            input.value = '';
            showTyping();

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                if (!response.ok) throw new Error('Backend error');

                const data = await response.json();
                removeTyping();
                addMessage(data.response, false);

            } catch (error) {
                removeTyping();
                addMessage(`Sorry, there was an error connecting to the backend.`, false);
                console.error(error);
            }
        }

        function quickQuery(text) {
            const input = document.getElementById('user-input');
            input.value = text;
            sendMessage();
        }

        function showIngestModal() {
            alert("Ingest feature will be added soon.");
        }

        // Initialize
        window.onload = function() {
            initializeChat();
            document.getElementById('user-input').focus();
        };
    </script>
</body>
</html>
